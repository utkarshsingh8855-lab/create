<!DOCTYPE html>
<html lang="en">
<head>
  <title>BPMCE Admission Form</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: url("college.jpg") center/cover no-repeat;
      background-attachment: fixed;
      padding: 40px 15px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
	  
    }

    .container {
      width: 100%;
      max-width: 1000px;
      margin: auto;
      background: rgba(255,255,255,0.7);
      padding: 30px 35px;
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      backdrop-filter: transparent;
      transition: transform .3s ease, box-shadow .3s ease;
    }
    .container:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 45px rgba(0,0,0,0.35);
    }

    h2 {
      text-align: center;
      color: #003366;
      font-size: 32px;
      margin-bottom: 25px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .section-title {
      font-weight: 700;
      font-size: 20px;
      margin: 25px 0 12px;
      color: #003366;
      border-left: 5px solid #003366;
      padding-left: 10px;
    }

    label {
      font-weight: 600;
      margin-top: 12px;
      display:block;
      color:#222;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      transition: all .3s ease;
    }
    input:focus, select:focus, textarea:focus {
      border-color:#3a7bd5;
      box-shadow:0 0 8px rgba(58,123,213,0.6);
      background:#fff;
      outline:none;
      transform: scale(1.01);
    }

    input[type="radio"], input[type="checkbox"] {
      width: auto;
      margin-right: 6px;
    }

    .inline {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .inline div {
      flex: 1;
      min-width: 220px;
    }

    .form-buttons {
      display: flex;
      justify-content: space-between;
      gap:15px;
      flex-wrap:wrap;
      margin-top:20px;
    }

    button {
      flex:1;
      min-width:140px;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg,#003366,#0059b3);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    button:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow:0 8px 15px rgba(0,0,0,0.3);
      background: linear-gradient(135deg,#002244,#004080);
    }
    button[type="reset"] {
      background: linear-gradient(135deg,#cc0000,#990000);
    }
    button[type="reset"]:hover {
      background: linear-gradient(135deg,#990000,#660000);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      overflow:hidden;
      border-radius:10px;
    }
    th, td {
      padding: 12px 10px;
      text-align: center;
      border: 1px solid #ccc;
      font-size:14px;
    }
    th {
      background:#003366;
      color:#fff;
      font-weight:600;
    }
    tr:nth-child(even) td {background:#f5f7fa;}

    @media (max-width:768px){
      .inline{flex-direction:column}
      .form-buttons{flex-direction:column}
    }
  </style>
</head>
<body>
  <div class="container">
   <h2>BPMCE Admission Form</h2>
    <!-- Your full admission form same as before -->
    <form>
      <!-- Personal Details -->
      <div class="section-title">Personal Details</div>
      <label for="fullname">Full Name *</label>
      <input type="text" id="fullname" name="fullname" required>

      <label for="dob">Date of Birth *</label>
      <input type="date" id="dob" name="dob" required>

      <label>Gender *</label>
      <input type="radio" name="gender" value="Male" required> Male
      <input type="radio" name="gender" value="Female"> Female
      <input type="radio" name="gender" value="Other"> Other

      <label for="marital">Marital Status *</label>
      <select id="marital" name="marital" required>
        <option value="" disabled selected>Select</option>
        <option>Single</option>
        <option>Married</option>
        <option>Divorced</option>
      </select>

      <!-- Family Details -->
      <div class="section-title">Family Details</div>
      <div class="inline">
        <div>
          <label for="father">Father's Name *</label>
          <input type="text" id="father" name="father" required>
        </div>
        <div>
          <label for="mother">Mother's Name *</label>
          <input type="text" id="mother" name="mother" required>
        </div>
      </div>

      <label for="category">Category *</label>
      <select id="category" name="category" required>
        <option value="" disabled selected>Select</option>
        <option>General</option>
        <option>OBC</option>
        <option>SC</option>
        <option>ST</option>
      </select>

      <!-- Contact Details -->
      <div class="section-title">Contact Details</div>
      <div class="inline">
        <div>
          <label for="phone">Mobile Number *</label>
          <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="10-digit number" required>
        </div>
        <div>
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" placeholder="example@mail.com" required>
        </div>
      </div>

      <label for="address">Permanent Address *</label>
      <textarea id="address" name="address" rows="3" required></textarea>

      <div class="inline">
        <div>
          <label for="state">State *</label>
          <select id="state" name="state" required>
            <option value="" disabled selected>Select State</option>
            <option>Bihar</option>
            <option>Uttar Pradesh</option>
            <option>Maharashtra</option>
            <option>Delhi</option>
            <option>Karnataka</option>
            <option>Tamil Nadu</option>
            <option>West Bengal</option>
            <option>Rajasthan</option>
          </select>
        </div>
        <div>
          <label for="district">District *</label>
          <input type="text" id="district" name="district" required>
        </div>
        <div>
          <label for="pincode">Pincode *</label>
          <input type="text" id="pincode" name="pincode" pattern="\d{6}" required>
        </div>
      </div>

      <!-- Academic Details -->
      <div class="section-title">Academic Details</div>
      <table>
        <tr>
          <th>Qualification</th>
          <th>Board/University</th>
          <th>Year of Passing</th>
          <th>School/College Name</th>
          <th>Percentage/CGPA</th>
        </tr>
        <tr>
          <td>10th *</td>
          <td><input type="text" name="board10" required></td>
          <td><input type="text" name="year10" required></td>
          <td><input type="text" name="school10" required></td>
          <td><input type="text" name="percent10" required></td>
        </tr>
        <tr>
          <td>12th *</td>
          <td><input type="text" name="board12" required></td>
          <td><input type="text" name="year12" required></td>
          <td><input type="text" name="school12" required></td>
          <td><input type="text" name="percent12" required></td>
        </tr>
        <tr>
          <td>Graduation</td>
          <td><input type="text" name="boardgrad"></td>
          <td><input type="text" name="yeargrad"></td>
          <td><input type="text" name="collegegrad"></td>
          <td><input type="text" name="percentgrad"></td>
        </tr>
      </table>

      <!-- Course Applied -->
      <div class="section-title">Course Applied For *</div>
      <select id="course" name="course" required>
        <option value="" disabled selected>Select Course</option>
        <option>B.Tech</option>
        <option>B.Sc</option>
        <option>B.Com</option>
        <option>BA</option>
        <option>M.Tech</option>
        <option>MBA</option>
      </select>

      <!-- Extra Options -->
      <div class="section-title">Additional Information</div>
      <label>Do you need Hostel Facility? *</label>
      <input type="radio" name="hostel" value="Yes" required> Yes
      <input type="radio" name="hostel" value="No"> No

      <label>Do you need College Transport? *</label>
      <input type="radio" name="transport" value="Yes" required> Yes
      <input type="radio" name="transport" value="No"> No

      <!-- Password -->
      <div class="section-title">Login Details</div>
      <label for="password">Create Password *</label>
      <input type="password" id="password" name="password" required>

      <!-- Declaration -->
      <div class="section-title">Declaration</div>
      <label>
        <input type="checkbox" name="declaration" required>
        I hereby declare that all information provided is true and correct.
      </label>

      <!-- Buttons -->
      <div class="form-buttons">
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
      </div>
    </form>
  </div>
</body>
</html>
